name: Deploy GM assessment page

# Publishes scripts/wayfront/gm-assessment/ to GitHub Pages.
# Requires a one-time repo setting: Settings -> Pages -> Source: "GitHub Actions".
# Once enabled, the page is served at the repository's Pages URL root.

on:
  push:
    branches: [main]
    paths:
      - "scripts/wayfront/gm-assessment/**"
      - ".github/workflows/deploy-gm-assessment.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload the one-pager as the site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: scripts/wayfront/gm-assessment

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
