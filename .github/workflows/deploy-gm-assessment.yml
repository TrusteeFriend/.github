name: Deploy GM assessment page

# Publishes scripts/wayfront/gm-assessment/ to GitHub Pages.
# The Configure Pages step self-enables Pages (source: GitHub Actions) via the
# API, so no manual repo setting is required. The page is served at the
# repository's Pages URL root. Requires that the org allows GitHub Pages.

on:
  push:
    branches: [main]
    paths:
      - "scripts/wayfront/gm-assessment/**"
      - ".github/workflows/deploy-gm-assessment.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          # Auto-enable Pages (source: GitHub Actions) via the API using the
          # workflow's pages:write permission, so no manual repo setting is needed.
          enablement: true

      - name: Upload the one-pager as the site root
        uses: actions/upload-pages-artifact@v3
        with:
          path: scripts/wayfront/gm-assessment

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
