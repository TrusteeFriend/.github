<!doctype html>
<html>
<head><meta charset="utf-8"><title>PENDING</title></head>
<body>
  <!-- Mock of the Wayfront form DOM: the source-tag hidden field + our new field -->
  <form>
    <input type="hidden" id="field_7401" name="fields[7401]" value="gm-brokerage">
    <input type="hidden" id="field_7409" name="fields[7409]" value="ZOOM_BOOKING_PENDING">
  </form>
  <pre id="result"></pre>

  <!-- ===== BEGIN: the exact capture script deployed to form 152 ===== -->
  <script>
  (function () {
    "use strict";
    var SENTINEL = "ZOOM_BOOKING_PENDING";
    var ZOOM_HOST_RE = /(^|\.)zoom\.us$/i;
    var LOG = "[zoom->ticket]";
    var fieldEl = null;
    function locateField() {
      var inputs = document.querySelectorAll('input[type="hidden"]');
      for (var i = 0; i < inputs.length; i++) {
        if (inputs[i].value === SENTINEL) return inputs[i];
      }
      return null;
    }
    function firstDefined() {
      for (var i = 0; i < arguments.length; i++) {
        var v = arguments[i];
        if (v !== undefined && v !== null && v !== "") return v;
      }
      return undefined;
    }
    function saveToTicketField(record) {
      if (!fieldEl) fieldEl = locateField();
      if (!fieldEl) { console.warn(LOG, "hidden field not found"); return false; }
      try { fieldEl.value = typeof record === "string" ? record : JSON.stringify(record); }
      catch (e) { fieldEl.value = String(record); }
      fieldEl.dispatchEvent(new Event("input", { bubbles: true }));
      fieldEl.dispatchEvent(new Event("change", { bubbles: true }));
      console.log(LOG, "saved booking", record);
      return true;
    }
    function extractBooking(data) {
      if (!data || typeof data !== "object") return null;
      var m = firstDefined(data.booking, data.meeting, data.appointment, data.event, data.payload, data.data, data) || {};
      var typeHint = String(firstDefined(data.type, data.event, data.action, data.name, "")).toLowerCase();
      var startTime = firstDefined(m.start_time, m.startTime, m.start, m.scheduled_time, m.scheduledTime, m.date, data.start_time, data.startTime);
      var joinUrl = firstDefined(m.join_url, m.joinUrl, m.join_link, m.url, m.meeting_url, m.meetingUrl, data.join_url, data.joinUrl);
      var looksLikeBooking = /book|schedul|appointment|confirm|complete|created|success/.test(typeHint) || !!startTime || !!joinUrl;
      if (!looksLikeBooking) return null;
      var invitee = firstDefined(m.invitee, m.attendee, m.booker, m.guest, {}) || {};
      var host = firstDefined(m.host, m.organizer, m.planner, {}) || {};
      return {
        _isBooking: true, _capturedAt: new Date().toISOString(),
        eventType: typeHint || undefined,
        startTime: startTime,
        endTime: firstDefined(m.end_time, m.endTime, m.end),
        timezone: firstDefined(m.timezone, m.time_zone, m.tz, data.timezone),
        joinUrl: joinUrl,
        meetingId: firstDefined(m.meeting_id, m.meetingId, m.id, m.uuid),
        inviteeName: firstDefined(invitee.name, invitee.full_name, ((invitee.first_name || "") + " " + (invitee.last_name || "")).trim()),
        inviteeEmail: firstDefined(invitee.email, invitee.email_address),
        hostName: firstDefined(host.name, host.full_name, host.display_name),
        raw: m
      };
    }
    function init() {
      fieldEl = locateField();
      if (fieldEl) { fieldEl.value = ""; console.log(LOG, "hidden field located & cleared"); }
      else { console.warn(LOG, "hidden field not found at init"); }
    }
    if (document.readyState === "loading") {
      document.addEventListener("DOMContentLoaded", function () { setTimeout(init, 500); });
    } else { setTimeout(init, 500); }
    window.addEventListener("message", function (ev) {
      var host;
      try { host = new URL(ev.origin).hostname; } catch (e) { return; }
      if (!ZOOM_HOST_RE.test(host)) return;
      var data = ev.data;
      if (typeof data === "string") { try { data = JSON.parse(data); } catch (e) {} }
      console.log(LOG, "message from", ev.origin, data);
      var booking = extractBooking(data);
      if (booking) saveToTicketField(booking);
    }, false);
    console.log(LOG, "listener installed");
  })();
  </script>
  <!-- ===== END capture script ===== -->

  <!-- ===== test harness ===== -->
  <script>
    var f = function(){ return document.getElementById('field_7409'); };
    // Sample Zoom-style booking payloads (several shapes, since the real one is TBD)
    var zoomOrigin = 'https://trusteefriend.zoom.us';
    // Step 1 @700ms: after init cleared the sentinel, send a NON-zoom message -> must be ignored
    setTimeout(function(){
      window.dispatchEvent(new MessageEvent('message', { origin:'https://evil.example.com', data:{ type:'booking.completed', start_time:'2026-07-16T19:00:00Z', join_url:'https://x' }}));
    }, 700);
    // Step 2 @1500ms: a real zoom-origin booking event
    setTimeout(function(){
      window.dispatchEvent(new MessageEvent('message', {
        origin: zoomOrigin,
        data: { type:'booking.completed', booking: {
          start_time:'2026-07-16T19:00:00Z', end_time:'2026-07-16T19:30:00Z',
          timezone:'America/Los_Angeles', join_url:'https://trusteefriend.zoom.us/j/8712345678',
          meeting_id:'8712345678', invitee:{ first_name:'Test', last_name:'Client', email:'client@example.com' },
          host:{ name:'Alex' } } }
      }));
    }, 1500);
    // Step 3 @3000ms: reflect results
    setTimeout(function(){
      var afterZoom = f().value;
      var out = {
        ignoredNonZoom: afterZoom.indexOf('evil') === -1,           // non-zoom must not have been captured (nothing evil in value)
        sentinelCleared_thenSet: afterZoom !== 'ZOOM_BOOKING_PENDING',
        captured: afterZoom
      };
      document.getElementById('result').textContent = JSON.stringify(out, null, 2);
      var ok = out.ignoredNonZoom && afterZoom && afterZoom.indexOf('8712345678') !== -1 && afterZoom.indexOf('2026-07-16T19:00:00Z') !== -1;
      document.title = ok ? 'PASS' : 'FAIL';
    }, 3000);
  </script>
</body>
</html>
