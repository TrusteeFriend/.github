<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>trusteeplan — Static Mockups</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');
:root{
  --teal:#799671;
  --teal-dark:#5f7b58;
  --teal-text:#6e8a64;
  --sidebar-bg:#eeeeee;
  --sidebar-hover:#e3e3e3;
  --main-bg:#eceeee;
  --field-bg:#efefef;
  --text:#3a3a3a;
  --text-light:#8c8c8c;
  --heading:#222222;
  --org-bg:#2c2c2c;
  --red:#c0504d;
  --olive:#455a64;
  --green:#799671;
  --line:#e4e4e4;
}
*{box-sizing:border-box;}
body{margin:0;font-family:'Manrope',-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#2b2b2b;color:var(--text);}
.tnr{font-family:'Times New Roman',Georgia,serif;font-style:italic;font-size:1.18em;line-height:1;}
/* viewer bar */
.viewer{position:sticky;top:0;z-index:50;background:#1f1f1f;color:#eee;display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid #000;}
.viewer h1{font-size:14px;margin:0;font-weight:600;letter-spacing:.3px;}
.viewer .sub{font-size:12px;color:#999;}
.viewer select{flex:0 0 auto;min-width:340px;padding:6px 8px;border-radius:6px;border:1px solid #444;background:#2b2b2b;color:#eee;font-size:13px;}
.viewer button{background:#3a3a3a;color:#eee;border:1px solid #555;border-radius:6px;padding:6px 12px;font-size:13px;cursor:pointer;}
.viewer button:hover{background:#4a4a4a;}
.viewer .spacer{flex:1;}
.viewer .count{font-size:12px;color:#aaa;min-width:60px;text-align:right;}
.stage{padding:22px;display:flex;justify-content:center;}
/* app frame */
.frame{width:1280px;max-width:100%;height:820px;background:#fff;border-radius:10px;overflow:hidden;position:relative;box-shadow:0 14px 50px rgba(0,0,0,.45);display:flex;flex-direction:column;}
.topbar{height:60px;flex:0 0 60px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 20px;}
.topbar.dark{background:#f4f4f4;}
.brand{color:#1a1a1a;font-family:'Times New Roman',Georgia,serif;font-weight:700;font-size:25px;letter-spacing:-.3px;}
.brand i{font-style:italic;}
.brand .logo{width:30px;height:30px;flex:0 0 30px;display:flex;}
.brand sup{font-size:9px;font-weight:600;color:var(--teal);}
.topright{display:flex;align-items:center;gap:14px;}
.chat-pill{background:#fff;border:1px solid #dcdcdc;border-radius:18px;display:flex;align-items:center;gap:6px;padding:5px 14px;font-size:12px;font-weight:700;color:#555;letter-spacing:.5px;}
.ava{width:34px;height:34px;border-radius:50%;background:var(--olive);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;}
.layout{flex:1;display:flex;min-height:0;}
/* sidebar */
.sidebar{width:288px;flex:0 0 288px;background:var(--sidebar-bg);display:flex;flex-direction:column;position:relative;border-right:1px solid #dcdcdc;overflow:hidden;}
.side-scroll{flex:1;overflow-y:auto;padding-bottom:140px;}
.side-welcome{padding:18px 20px 14px;display:flex;flex-direction:column;gap:8px;background:#e3e3e3;}
.side-welcome .ava{width:46px;height:46px;background:var(--green);font-size:18px;}
.side-welcome .wb{font-size:15px;color:#555;}
.nav{padding:6px 0;}
.nav-item{display:flex;align-items:center;gap:12px;padding:11px 20px;font-size:15px;color:#555;cursor:default;}
.nav-item .ico{width:20px;height:20px;flex:0 0 20px;color:#666;}
.nav-item.active{font-weight:700;color:#333;}
.nav-divider{height:1px;background:#d8d8d8;margin:6px 20px;}
.submenu{padding:2px 0 0;}
.sub-group{font-weight:700;color:#555;font-size:14px;padding:12px 20px 4px;}
.sub-doc{color:#9a9a9a;font-size:14px;padding:5px 20px;}
.sub-step{display:flex;align-items:center;justify-content:space-between;padding:7px 20px 7px 20px;font-size:14px;color:#6a6a6a;}
.sub-step.active{font-weight:700;color:#333;}
.sub-step .err{color:var(--red);font-size:13px;}
.lock{color:#9a9a9a;font-size:12px;}
.free{background:#dde7d8;color:#5f7b58;font-size:10px;font-weight:700;padding:2px 7px;border-radius:3px;letter-spacing:.5px;}
.sub-line{display:flex;align-items:center;gap:8px;}
/* org card */
.orgcard{position:absolute;left:12px;right:12px;bottom:30px;background:#fff;color:#2a2a2a;padding:13px 14px;display:flex;flex-direction:column;gap:9px;border-radius:14px;border:1px solid #ededed;box-shadow:0 4px 14px rgba(0,0,0,.05);}
.orgcard .top{display:flex;align-items:center;gap:11px;}
.orgcard .ava{width:38px;height:38px;background:#e6ede1;color:#5f7b58;font-size:14px;}
.orgcard .nm{font-size:13px;line-height:1.32;}
.orgcard .nm .sub{color:#a3a3a3;font-size:11px;font-weight:500;}
.orgcard .nm b{display:block;color:#2a2a2a;font-size:13.5px;font-weight:700;}
.orgcard .ct{font-size:12px;color:#8c8c8c;display:flex;align-items:center;gap:9px;}
.orgcard .ct svg{color:#799671;flex:0 0 auto;}
.poweredby{position:absolute;left:20px;bottom:6px;font-size:11px;color:#b3b3b3;}
/* content */
.content{flex:1;background:var(--main-bg);position:relative;overflow-y:auto;}
.content-pad{padding:26px 30px;}
.panel{background:#fff;border-radius:4px;box-shadow:0 1px 3px rgba(0,0,0,.07);}
.panel-head{display:flex;align-items:flex-start;justify-content:space-between;padding:22px 26px 0;}
.titleblock{display:flex;gap:12px;}
.accent{width:5px;background:#cfcfcf;border-radius:2px;align-self:stretch;}
.doc-small{font-size:15px;color:#777;}
.doc-small b{color:#555;}
.doc-big{font-size:24px;color:var(--teal-text);font-weight:400;margin-top:2px;}
.cloud{color:#bdbdbd;font-size:22px;}
.hr{height:1px;background:var(--line);margin:16px 26px 0;}
.body{padding:22px 26px 26px;}
.layout-tips{display:grid;grid-template-columns:1fr 270px;}
.form-col{padding:22px 26px 26px;}
.tips{background:#f6f6f6;border-left:1px solid #ededed;padding:20px 20px;font-size:12.5px;color:#777;line-height:1.5;}
.tips-q{color:var(--teal-text);font-size:13.5px;margin:0 0 5px;}
.tips-p{margin:0 0 16px;}
.tips-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#9a9a9a;gap:14px;padding-top:30px;}
.qmark{width:74px;height:74px;border-radius:50%;background:#cfcfcf;color:#fff;display:flex;align-items:center;justify-content:center;font-size:40px;font-weight:700;}
.section-title{font-size:18px;font-weight:700;color:var(--heading);margin:0 0 18px;}
.subtitle{font-size:13px;color:#888;margin:-12px 0 18px;}
.field{background:var(--field-bg);border-radius:3px;padding:8px 14px;margin-bottom:4px;}
.field-label{font-size:11px;color:#8c8c8c;}
.field-label.teal{color:var(--teal-text);}
.field-val{font-size:15px;color:#444;min-height:20px;}
.field-val.ph{color:#aeaeae;}
.field.sel{display:flex;align-items:center;justify-content:space-between;}
.field.sel .chev{color:#9a9a9a;font-size:11px;}
.field.err{border-bottom:2px solid var(--red);}
.field-help{font-size:12.5px;color:#8a8a8a;margin:2px 2px 16px;}
.err-msg{color:var(--red);font-size:12.5px;margin:4px 2px 14px;}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.row2.tight{margin-bottom:4px;}
.gender-lbl{font-size:15px;color:#666;margin:14px 0 8px;}
.radios{display:flex;gap:26px;align-items:center;}
.radios.stack{flex-direction:column;align-items:flex-start;gap:12px;}
.radio{display:flex;align-items:center;gap:9px;font-size:15px;color:#555;}
.radio .dot{width:18px;height:18px;border-radius:50%;border:2px solid #b5b5b5;display:flex;align-items:center;justify-content:center;}
.radio.on .dot{border-color:var(--teal);}
.radio.on .dot::after{content:"";width:9px;height:9px;border-radius:50%;background:var(--teal);}
.check{width:18px;height:18px;border-radius:3px;border:2px solid #b5b5b5;display:inline-flex;align-items:center;justify-content:center;}
.check.on{background:var(--teal);border-color:var(--teal);color:#fff;font-size:12px;}
.btn-row{display:flex;justify-content:flex-end;gap:12px;margin-top:24px;}
.btn{border:none;border-radius:4px;padding:11px 26px;font-size:14px;font-weight:600;color:#fff;cursor:default;}
.btn.teal{background:var(--teal);}
.btn.gray{background:#bdbdbd;}
.btn.outline{background:#fff;border:1px solid var(--teal);color:var(--teal);}
/* bottom step nav */
.stepnav{position:absolute;bottom:0;left:0;right:0;height:54px;background:#fff;border-top:1px solid #eee;display:flex;align-items:center;justify-content:space-between;padding:0 22px;z-index:3;}
.stepnav .side{width:30px;color:#9a9a9a;font-size:20px;display:flex;align-items:center;}
.dots{display:flex;align-items:center;gap:9px;}
.dot{width:9px;height:9px;border-radius:50%;background:#cdddc7;}
.dot.done{background:#a9c2a0;}
.dot.active{background:#799671;}
.dot.todo{background:#d6d6d6;}
.dot.pink{background:#c2b7a6;}
.dotline{width:14px;height:2px;background:#dcdcdc;}
/* fab */
.fab-wrap{position:absolute;right:26px;bottom:26px;display:flex;flex-direction:column;align-items:flex-end;gap:14px;}
.fab-item{display:flex;align-items:center;gap:12px;}
.fab-label{background:#fff;border-radius:4px;padding:6px 12px;font-size:13px;color:#555;box-shadow:0 1px 4px rgba(0,0,0,.2);}
.fab-btn{width:46px;height:46px;border-radius:50%;background:#fff;color:#777;box-shadow:0 2px 6px rgba(0,0,0,.25);display:flex;align-items:center;justify-content:center;font-size:22px;}
.fab-close{width:52px;height:52px;border-radius:50%;background:#7d7d7d;color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:24px;}
.fab-main{width:52px;height:52px;border-radius:50%;background:var(--teal);color:#fff;box-shadow:0 2px 8px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:center;font-size:22px;}
/* dim overlay behind modal/fab */
.dim{position:absolute;inset:0;background:rgba(80,90,95,.55);}
/* welcome empty state */
.welcome-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:0 16%;gap:18px;color:#7a7a7a;}
.welcome-empty h2{font-size:34px;font-weight:400;color:#6a6a6a;margin:0;}
.welcome-empty p{font-size:15px;line-height:1.5;margin:0;}
/* modal (T&C / preview) */
.modal-overlay{position:absolute;inset:0;background:rgba(70,80,85,.55);display:flex;align-items:center;justify-content:center;}
.modal{background:#fff;border-radius:6px;width:840px;max-width:92%;max-height:86%;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 40px rgba(0,0,0,.3);}
.modal-brandbar{display:flex;align-items:center;justify-content:space-between;padding:16px 22px;border-bottom:1px solid #f0f0f0;}
.modal-brandbar .brand{color:#222;}
.user-pill{border:1px solid #dadada;border-radius:6px;display:flex;align-items:center;gap:8px;padding:6px 12px;font-size:13px;color:#555;}
.user-pill .ava{width:24px;height:24px;font-size:11px;background:var(--green);}
.tc-bar{display:flex;align-items:center;justify-content:space-between;padding:13px 22px;background:#f1f1f1;}
.tc-bar.agreed{background:#eef3ec;}
.tc-bar .t{color:var(--teal-text);font-weight:700;font-size:15px;}
.tc-bar .meta{display:flex;align-items:center;gap:8px;color:#8a8a8a;font-size:13px;}
.tc-bar .chev{color:#9a9a9a;}
.check-circle{width:22px;height:22px;border-radius:50%;background:#7d7d7d;color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;}
.modal-body{padding:24px 30px;overflow-y:auto;color:#555;}
.modal-body h3{text-align:center;font-weight:400;font-size:26px;color:#666;margin:0 0 16px;}
.modal-body h4{font-size:17px;color:#555;margin:20px 0 8px;}
.modal-body p{font-size:14px;line-height:1.55;margin:0 0 10px;}
.modal-body .clause{font-weight:700;}
.agree-banner{display:flex;align-items:center;justify-content:space-between;gap:16px;background:#eef3ec;border:1px solid #dde7d8;border-radius:4px;padding:10px 16px;margin:14px 0;}
.agree-banner span{font-size:13.5px;color:#777;}
.btn-sm{border:none;border-radius:4px;padding:8px 20px;color:#fff;font-weight:600;font-size:13px;background:var(--teal);}
.modal-foot{display:flex;justify-content:flex-end;padding:14px 22px;border-top:1px solid #f0f0f0;}
.modal-empty{min-height:320px;}
/* prepare list / doc package */
.prepare h4{color:var(--teal-text);font-size:15px;margin:6px 0 10px;}
.prepare-row{display:flex;align-items:center;gap:12px;border:1px solid #eee;padding:14px 16px;}
.prepare-row.sel{background:#f3f3f3;}
.pp-ava{width:36px;height:36px;border-radius:50%;background:#5b5b5b;color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;}
.pp-ava.green{background:#799671;}
.pp-name{font-size:15px;color:#444;}
.pp-role{font-size:12px;color:#999;}
.pkg-list{margin-top:14px;}
.pkg-list .doc{display:flex;align-items:center;gap:10px;font-size:14px;color:#777;padding:5px 0;}
.muted-link{color:var(--teal-text);}
/* contact cards */
.contacts-title{text-align:center;font-size:26px;font-weight:400;color:#6a6a6a;margin:6px 0 22px;}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;}
.contact-card{background:#fff;border-radius:4px;display:flex;align-items:center;gap:14px;padding:16px 18px;box-shadow:0 1px 3px rgba(0,0,0,.08);}
.contact-ava{width:42px;height:42px;border-radius:50%;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;}
.contact-info{flex:1;}
.contact-name{font-size:16px;color:#444;}
.contact-role{font-size:13px;color:#9a9a9a;}
.contact-actions{display:flex;gap:14px;color:#9a9a9a;font-size:16px;}
.contacts-note{text-align:center;font-size:14px;color:#888;max-width:620px;margin:22px auto 0;line-height:1.5;}
/* repeatable item card */
.item-card{border:1px solid #ededed;border-radius:4px;background:#fafafa;margin-bottom:10px;}
.item-head{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;color:#999;font-size:14px;}
.item-head .left{display:flex;align-items:center;gap:12px;}
.item-head .right{display:flex;align-items:center;gap:14px;color:#9a9a9a;}
.item-body{padding:6px 18px 18px;}
.grip{color:#bbb;letter-spacing:-2px;}
.add-row{border:1px solid #ededed;border-radius:4px;text-align:center;padding:14px;color:#777;font-size:14px;}
.mini-title{font-weight:700;color:#555;font-size:15px;margin:14px 0 8px;}
.bequest-row{display:flex;align-items:center;gap:8px;padding:12px 16px;border:1px solid #eee;border-radius:4px;}
/* files table */
.files-head{display:flex;align-items:center;justify-content:space-between;padding:18px 26px 8px;}
.files-head .ttl{display:flex;align-items:center;gap:12px;font-size:22px;color:#666;}
.files-actions{display:flex;align-items:center;gap:10px;}
.circle-btn{width:34px;height:34px;border-radius:50%;border:1px solid #d6d6d6;background:#fff;color:#777;display:flex;align-items:center;justify-content:center;font-size:16px;}
.circle-btn.teal{background:var(--teal);color:#fff;border:none;font-size:22px;}
.files-wrap{display:flex;}
.files-main{flex:1;}
.select-bar{display:flex;align-items:center;gap:8px;padding:8px 26px;color:#888;}
.ftable{width:100%;border-collapse:collapse;font-size:14px;}
.ftable th{text-align:left;color:#777;font-weight:700;padding:10px 12px;border-bottom:1px solid #eee;}
.ftable td{padding:14px 12px;border-bottom:1px solid #f1f1f1;color:#555;vertical-align:middle;}
.ftable tr.sel td{background:#fff;}
.ftable tr.sel{outline:1.5px solid var(--teal);}
.fname{display:flex;align-items:center;gap:10px;}
.fname .fico{color:#9a9a9a;}
.kebab{color:#999;text-align:center;}
.mod{color:#9a9a9a;font-size:13px;}
.details-panel{width:300px;flex:0 0 300px;border-left:1px solid #eee;padding:20px;background:#fafafa;}
.details-empty{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#9a9a9a;gap:12px;text-align:center;}
.info-circle{width:42px;height:42px;border-radius:50%;border:2px solid #bdbdbd;color:#999;display:flex;align-items:center;justify-content:center;font-style:italic;font-weight:700;}
.dp-title{font-weight:700;color:#555;font-size:14px;margin-bottom:12px;}
.thumb{border:1px solid #e2e2e2;background:#fff;height:230px;display:flex;align-items:center;justify-content:center;color:#bbb;font-size:12px;text-align:center;padding:10px;overflow:hidden;}
.thumb-nav{display:flex;align-items:center;justify-content:center;gap:24px;color:#888;margin:10px 0;font-size:14px;}
.dp-section{color:var(--teal-text);font-weight:700;font-size:14px;margin:14px 0 8px;}
.dp-row{margin-bottom:10px;}
.dp-row .k{font-weight:700;color:#555;font-size:13px;}
.dp-row .v{color:#888;font-size:13px;}
.dp-actions{display:flex;gap:18px;justify-content:flex-end;color:#888;font-size:16px;margin-top:18px;}
.menu-pop{position:absolute;right:26px;top:62px;background:#fff;border-radius:6px;box-shadow:0 6px 24px rgba(0,0,0,.18);padding:6px 0;width:180px;z-index:5;}
.menu-pop .mi{display:flex;align-items:center;gap:12px;padding:11px 16px;font-size:14px;color:#555;}
svg{display:block;}

.store-wrap{max-width:1000px;margin:0 auto;}
.store-title{text-align:center;font-size:28px;color:#3a3a3a;font-weight:800;margin:4px 0 4px;letter-spacing:-.4px;}
.store-sub{text-align:center;color:#8a8a8a;font-size:15px;margin-bottom:26px;}
.store-section-label{font-size:12px;font-weight:700;color:#a0a0a0;text-transform:uppercase;letter-spacing:.7px;margin:24px 0 12px;}
.cat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(290px,1fr));gap:16px;}
.cat-card{background:#fff;border:1px solid #ededed;border-radius:14px;padding:20px;display:flex;flex-direction:column;gap:11px;box-shadow:0 2px 10px rgba(0,0,0,.04);position:relative;}
.cat-card.feat{border:1.5px solid #799671;box-shadow:0 8px 24px rgba(121,150,113,.20);}
.cat-ico{width:46px;height:46px;border-radius:12px;background:#e6ede1;color:#5f7b58;display:flex;align-items:center;justify-content:center;}
.cat-name{font-weight:700;color:#222;font-size:15.5px;line-height:1.25;}
.cat-desc{font-size:13px;color:#8a8a8a;line-height:1.5;flex:1;}
.cat-foot{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:6px;min-height:38px;}
.cat-status{display:flex;align-items:center;gap:6px;color:#5f7b58;font-size:13px;font-weight:700;}
.cat-status.muted{color:#a8a8a8;}
.cat-price{font-weight:800;color:#222;font-size:19px;}
.cat-price small{font-weight:600;color:#9a9a9a;font-size:11px;}
.btn-buy{background:#799671;color:#fff;border:none;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:default;}
.btn-ghost{background:#fff;border:1px solid #cdd6c9;color:#5f7b58;border-radius:9px;padding:9px 16px;font-size:13px;font-weight:700;cursor:default;}
.ribbon{position:absolute;top:-10px;right:18px;background:#799671;color:#fff;font-size:10px;font-weight:700;letter-spacing:.6px;padding:3px 11px;border-radius:20px;text-transform:uppercase;}
</style>
</head>
<body>
<div class="viewer">
  <h1>trustee<i>plan</i></h1>
  <span class="sub">static mockups</span>
  <select id="picker" onchange="show(this.value)"></select>
  <button onclick="step(-1)">‹ Prev</button>
  <button onclick="step(1)">Next ›</button>
  <span class="spacer"></span>
  <span class="count" id="count"></span>
</div>
<div class="stage"><div id="root"></div></div>

<script>
/* ---------- shared building blocks ---------- */

function field(label, value, opts={}){
  const ph = opts.placeholder ? ' ph' : '';
  const teal = opts.teal ? ' teal' : '';
  const err = opts.error ? ' err' : '';
  let h = `<div class="field${err}"><div class="field-label${teal}">${label}</div><div class="field-val${ph}">${value||'&nbsp;'}</div></div>`;
  if(opts.help) h += `<div class="field-help">${opts.help}</div>`;
  if(opts.errMsg) h += `<div class="err-msg">${opts.errMsg}</div>`;
  return h;
}
function selectField(label, value, opts={}){
  const ph = opts.placeholder ? ' ph' : '';
  const err = opts.error ? ' err' : '';
  let h = `<div class="field sel${err}"><div><div class="field-label">${label}</div><div class="field-val${ph}">${value||'&nbsp;'}</div></div><div class="chev">▼</div></div>`;
  if(opts.help) h += `<div class="field-help">${opts.help}</div>`;
  if(opts.errMsg) h += `<div class="err-msg">${opts.errMsg}</div>`;
  return h;
}
function radios(name, opts, stack){
  const r = opts.map(o=>`<label class="radio ${o.on?'on':''}"><span class="dot"></span>${o.label}</label>`).join('');
  return `<div class="radios ${stack?'stack':''}">${r}</div>`;
}
function btnRow(btns){
  return `<div class="btn-row">${btns.map(b=>`<button class="btn ${b.kind||'teal'}">${b.t}</button>`).join('')}</div>`;
}
function tips(items){
  return `<div class="tips">${items.map(i=>`<div class="tips-q">${i.q}</div><p class="tips-p">${i.a}</p>`).join('')}</div>`;
}
function tipsEmpty(){
  return `<div class="tips"><div class="tips-empty"><div class="qmark">?</div><div>No Tips Available</div></div></div>`;
}
function dots(cfg){
  // cfg: array of 'done','active','todo','pink','line'
  return `<div class="dots">${cfg.map(c=> c==='line'?'<span class="dotline"></span>':`<span class="dot ${c}"></span>`).join('')}</div>`;
}
function stepnav(opts){
  const left = opts.left==='x' ? '✕' : (opts.left==='back' ? '‹' : '');
  const right = opts.right==='check' ? '✓' : (opts.right==='fwd' ? '›' : '');
  return `<div class="stepnav"><div class="side">${left}</div>${dots(opts.dots||[])}<div class="side" style="justify-content:flex-end">${right}</div></div>`;
}

<script>
/* ===== Questionnaire (TrusteeFriend intake — trusteeplan-branded) ===== */
const QSTEPS = ['Personal','Family','Estate Roles','Assets','Distribution','Final'];
function qStepper(active){
  return `<div class="qsteps">`+QSTEPS.map((s,i)=>{
    const cls = i<active ? 'done' : (i===active ? 'active' : '');
    const dot = i<active ? '✓' : (i+1);
    return `<div class="qstep ${cls}"><span class="qs-dot">${dot}</span><span class="qs-lbl">${s}</span></div>`+(i<QSTEPS.length-1?'<span class="qs-line"></span>':'');
  }).join('')+`</div>`;
}
function qHead(title){
  return `<div class="panel-head"><div class="titleblock"><div class="accent"></div><div><div class="doc-small">Stephanie Clark's <b>Estate Plan</b></div><div class="doc-big">${title}</div></div></div>${ICON.cloud}</div><div class="hr"></div>`;
}
function idots(active,total){let a=[];for(let i=0;i<total;i++){a.push(i<active?'done':(i===active?'active':'todo'));}return a;}

<script>
/* ---------- picker / navigation ---------- */
let CUR = 0;
function buildPicker(){
  const p = document.getElementById('picker');
  p.innerHTML = SCREENS.map((s,i)=>`<option value="${i}">${String(i+1).padStart(2,'0')} — ${s.label}</option>`).join('');
}
function show(i){
  CUR = (+i+SCREENS.length)%SCREENS.length;
  document.getElementById('root').innerHTML = renderShell(SCREENS[CUR]);
  document.getElementById('picker').value = CUR;
  document.getElementById('count').textContent = (CUR+1)+' / '+SCREENS.length;
}
function step(d){ show(CUR+d); }
buildPicker();
show(0);
</script>
