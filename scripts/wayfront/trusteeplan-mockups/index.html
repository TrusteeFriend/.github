const stage = document.getElementById('stage');
const capEl = document.getElementById('caption');
const frames = [];

function frameFor(i){
  if(frames[i]) return frames[i];
  const f = document.createElement('iframe');
  f.title = CAPTIONS[i];
  // Decode base64 -> UTF-8 and load in an isolated iframe (no style/script clashes).
  const bytes = Uint8Array.from(atob(DOCS[i]), c => c.charCodeAt(0));
  f.srcdoc = new TextDecoder('utf-8').decode(bytes);
  stage.appendChild(f);
  frames[i] = f;
  return f;
}

function pick(i){
  document.querySelectorAll('.tab').forEach(t => {
    const on = (+t.dataset.i === i);
    t.classList.toggle('active', on);
    t.setAttribute('aria-selected', on ? 'true' : 'false');
  });
  frames.forEach(f => f && f.classList.remove('on'));
  frameFor(i).classList.add('on');   // lazy-create on first view
  capEl.textContent = CAPTIONS[i];
  location.hash = 'v' + i;
}

const start = Math.max(0, Math.min(DOCS.length - 1, parseInt((location.hash.match(/^#v(\d+)$/)||[])[1] ?? '0', 10) || 0));
pick(start);
