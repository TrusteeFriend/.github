<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Schedule a Free Assessment | TrusteeFriend</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --tf-accent: #2c4e50;
      --tf-accent-dark: #223c3e;
      --tf-bg: #f3f1ec;
      --tf-text: #1f2a2b;
      --tf-muted: #6a7778;
      --tf-border: #e4ded2;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--tf-bg);
      color: var(--tf-text);
      font-family: 'Manrope', Arial, Helvetica, sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    .page {
      max-width: 1080px;
      margin: 0 auto;
      padding: 56px 24px 32px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header.brand {
      text-align: center;
      margin-bottom: 30px;
    }

    .wordmark {
      display: inline-block;
      line-height: 0;
      text-decoration: none;
    }

    .wordmark img {
      display: block;
      height: 112px;
      width: auto;
    }

    h1 {
      text-align: center;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: -0.02em;
      line-height: 1.15;
      margin: 0 0 14px;
      color: var(--tf-text);
    }

    .subtitle {
      text-align: center;
      font-size: 19px;
      font-weight: 500;
      line-height: 1.55;
      color: var(--tf-muted);
      margin: 0 auto;
      max-width: 640px;
    }

    /* Step 1: the question card */
    .question {
      max-width: 560px;
      margin: 44px auto 0;
      background: #fff;
      border: 1px solid var(--tf-border);
      border-radius: 20px;
      padding: 48px 44px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(31, 42, 43, 0.09);
    }

    .question h2 {
      font-size: 25px;
      font-weight: 700;
      letter-spacing: -0.01em;
      margin: 0 0 28px;
      color: var(--tf-text);
    }

    .question p.hint {
      font-size: 16.5px;
      font-weight: 500;
      color: var(--tf-muted);
      margin: 0 0 30px;
    }

    .choices {
      display: flex;
      gap: 16px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .btn {
      appearance: none;
      border: 1.5px solid var(--tf-accent);
      background: var(--tf-accent);
      color: #fff;
      font-family: inherit;
      font-size: 18px;
      font-weight: 700;
      padding: 16px 48px;
      border-radius: 12px;
      cursor: pointer;
      min-width: 160px;
      transition: background 0.15s ease, transform 0.05s ease, box-shadow 0.15s ease;
    }

    .btn:hover { background: var(--tf-accent-dark); border-color: var(--tf-accent-dark); box-shadow: 0 6px 16px rgba(44, 78, 80, 0.24); }
    .btn:active { transform: translateY(1px); }

    .btn.secondary {
      background: #fff;
      color: var(--tf-accent);
    }
    .btn.secondary:hover { background: #f2f6f6; box-shadow: none; }

    /* Step 2: the scheduler. Zoom only renders its wide two-column layout above
       its own desktop breakpoint, so give the iframe the full page width. */
    .scheduler { display: none; }
    .scheduler.active { display: block; max-width: 100%; margin: 0 auto; }

    .change-answer {
      margin: 0 0 16px;
    }

    .change-answer a {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      font-size: 16px;
      font-weight: 700;
      color: var(--tf-accent);
      background: #eae6dc;
      border-radius: 10px;
      padding: 10px 18px;
      text-decoration: none;
      cursor: pointer;
      transition: background 0.15s ease;
    }
    .change-answer a:hover { background: #e0dbcd; }

    .embed-shell {
      background: transparent;
    }

    .embed-shell iframe {
      display: block;
      width: 100%;
      height: 720px;
      border: 0;
      background: transparent;
    }

    footer.legal {
      text-align: center;
      font-size: 14px;
      font-weight: 500;
      color: var(--tf-muted);
      margin-top: auto;
      padding-top: 40px;
    }

    @media (max-width: 640px) {
      .page { padding: 36px 18px 48px; }
      h1 { font-size: 30px; }
      .subtitle { font-size: 17px; }
      .wordmark img { height: 76px; }
      .question { padding: 36px 24px; }
      .btn { padding: 15px 32px; width: 100%; font-size: 17px; }
      .embed-shell iframe { height: 780px; }
    }
  </style>
</head>

        iframe.setAttribute('title', 'TrusteeFriend Assessment Scheduler');
        iframe.setAttribute('allow', 'fullscreen');
        iframe.setAttribute('loading', 'lazy');
        iframe.setAttribute('allowtransparency', 'true');
        shell.appendChild(iframe);
        shell.setAttribute('data-mounted', 'true');
      }

      // Tear down a panel's iframe so no hidden Zoom session lingers.
      function unmount(choice) {
        var shell = panels[choice].querySelector('[data-embed]');
        if (shell.getAttribute('data-mounted') !== 'true') return;
        shell.innerHTML = '';
        shell.removeAttribute('data-mounted');
      }

      function show(choice) {
        question.style.display = 'none';
        Object.keys(panels).forEach(function (key) {
          var active = key === choice;
          panels[key].classList.toggle('active', active);
          panels[key].setAttribute('aria-hidden', active ? 'false' : 'true');
          // Keep exactly one scheduler loaded at a time.
          if (active) { mount(key); } else { unmount(key); }
        });
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      function reset() {
        Object.keys(panels).forEach(function (key) {
          panels[key].classList.remove('active');
          panels[key].setAttribute('aria-hidden', 'true');
          unmount(key);
        });
        question.style.display = '';
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }

      question.addEventListener('click', function (e) {
        var btn = e.target.closest('[data-choice]');
        if (!btn) return;
        show(btn.getAttribute('data-choice'));
      });

      Object.keys(panels).forEach(function (key) {
        panels[key].addEventListener('click', function (e) {
          var link = e.target.closest('[data-action="change"]');
          if (!link) return;
          e.preventDefault();
          reset();
        });
      });
    })();
  </script>
</body>
</html>
